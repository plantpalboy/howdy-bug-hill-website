<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Howdy, Bug Hill</title>
  <style>
    :root {
      --bg: #f7f3e8;
      --text: #2f3a2f;
      --muted: #6f7a65;
      --leaf: #76a86b;
      --leaf-dark: #4f7f47;
      --card: rgba(255, 255, 255, 0.62);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: ui-rounded, "SF Pro Rounded", "Nunito", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #fff7d7 0, transparent 35%),
        radial-gradient(circle at bottom right, #d9f0cf 0, transparent 34%),
        var(--bg);
    }

    .wrap {
      position: relative;
      width: min(92vw, 560px);
      padding: 56px 32px;
      text-align: center;
      border: 1px solid rgba(79, 127, 71, 0.16);
      border-radius: 0;
      background: var(--card);
      box-shadow: 0 24px 70px rgba(47, 58, 47, 0.12);
      backdrop-filter: blur(14px);
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 10vw, 5.8rem);
      line-height: 0.95;
      letter-spacing: -0.07em;
    }

    p {
      max-width: 36ch;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      padding: 10px 16px;
      border-radius: 0;
      background: rgba(118, 168, 107, 0.14);
      color: var(--leaf-dark);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 0;
      background: var(--leaf);
      animation: pulse 1.6s ease-in-out infinite;
    }

    .falling-leaf {
      position: fixed;
      top: -60px;
      width: 24px;
      height: 17px;
      background: var(--leaf);
      border-radius: 100% 0 100% 0;
      opacity: 0.45;
      animation: fall linear infinite;
      z-index: 1;
    }

    .falling-leaf:nth-child(1) { left: 8%; animation-duration: 9s; animation-delay: 0s; }
    .falling-leaf:nth-child(2) { left: 22%; animation-duration: 12s; animation-delay: 2s; transform: scale(0.8); }
    .falling-leaf:nth-child(3) { left: 48%; animation-duration: 10s; animation-delay: 4s; transform: scale(1.1); }
    .falling-leaf:nth-child(4) { left: 70%; animation-duration: 13s; animation-delay: 1s; transform: scale(0.7); }
    .falling-leaf:nth-child(5) { left: 88%; animation-duration: 11s; animation-delay: 3s; }


    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.45); opacity: 0.55; }
    }

    @keyframes fall {
      0% {
        transform: translate3d(0, -60px, 0) rotate(0deg);
      }
      50% {
        transform: translate3d(42px, 52vh, 0) rotate(180deg);
      }
      100% {
        transform: translate3d(-28px, 110vh, 0) rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <span class="falling-leaf"></span>
  <span class="falling-leaf"></span>
  <span class="falling-leaf"></span>
  <span class="falling-leaf"></span>
  <span class="falling-leaf"></span>

  <main class="wrap">
    <h1>Howdy<br />Bug Hill</h1>
    <p>Working on a new game...</p>

    <div class="pill">
      <span class="dot"></span>
      growing quietly
    </div>
  </main>
</body>
</html>
