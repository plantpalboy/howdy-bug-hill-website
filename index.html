<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Howdy, Bug Hill</title>
  <style>
    :root {
      --bg-top: #c9d88d;
      --bg-bottom: #8fb66b;
      --text: #273124;
      --muted: #59613f;
      --cream: #f4edc4;
      --border: #304d34;
      --shadow: #867b4f;
      --gold: #d6c979;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Courier New", monospace;
      color: var(--text);
      background:
        linear-gradient(0deg, rgba(48, 77, 52, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(48, 77, 52, 0.07) 1px, transparent 1px),
        linear-gradient(var(--bg-top), var(--bg-bottom));
      background-size: 8px 8px, 8px 8px, auto;
      image-rendering: pixelated;
    }

    .wrap {
      position: relative;
      width: min(92vw, 560px);
      padding: 44px 28px;
      text-align: center;
      border: 4px solid var(--border);
      border-radius: 0;
      background: var(--cream);
      box-shadow: 8px 8px 0 var(--shadow);
      z-index: 1;
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 2px solid rgba(48, 77, 52, 0.28);
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 10vw, 5.4rem);
      line-height: 0.9;
      letter-spacing: -0.06em;
      font-weight: 900;
      text-transform: uppercase;
    }

    p {
      max-width: 36ch;
      margin: 22px auto 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      padding: 10px 14px;
      border: 3px solid var(--border);
      border-radius: 0;
      background: var(--gold);
      color: var(--border);
      font-size: 0.9rem;
      font-weight: 900;
      text-transform: uppercase;
      box-shadow: 4px 4px 0 var(--shadow);
    }

    .leaf-emoji {
      display: inline-block;
      font-size: 1rem;
      line-height: 1;
      animation: blink 1.4s steps(2, end) infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Howdy,<br />Bug Hill</h1>
    <p>Working on a new game...</p>

    <div class="pill">
      <span class="leaf-emoji">🍃</span>
      growing quietly
    </div>
  </main>
</body>
</html>
