<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Howdy, Bug Hill</title>
  <link rel="icon" href="images/greenleaf.ico" type="image/x-icon" />
  <style>
    :root {
      --text: #f6ffe8;
      --muted: #c8f08e;
      --gold: #f4f36a;
      --black: #000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      font-family: "Comic Sans MS", "Comic Neue", "Chalkboard SE", "Marker Felt", fantasy;
      color: var(--text);
      background:
        linear-gradient(rgba(0, 0, 0, 0.16), rgba(0, 0, 0, 0.46)),
        var(--black) url("images/Background/star background.gif") top left / 50vw 50vh repeat;
      image-rendering: pixelated;
    }

    .wrap {
      position: relative;
      width: min(92vw, 560px);
      padding: 72px 24px;
      text-align: center;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 10vw, 5.4rem);
      line-height: 0.95;
      letter-spacing: 0;
      font-weight: 900;
      text-transform: uppercase;
    }

    .float-letter {
      display: inline-block;
      animation: float-letter 14s ease-in-out infinite;
      animation-delay: calc(var(--i) * -0.42s);
    }

    .float-letter:nth-child(3n) {
      animation-duration: 16s;
    }

    .float-letter:nth-child(4n) {
      animation-duration: 12s;
    }

    .title-space {
      display: inline-block;
      width: 0.28em;
    }

    p {
      max-width: 36ch;
      margin: 22px auto 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.6;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      color: var(--gold);
      font-size: 0.95rem;
      font-weight: 900;
      text-transform: uppercase;
      text-shadow: 2px 2px 0 #000;
      animation: blink 2.8s ease-in-out infinite;
    }

    .signup {
      max-width: 34ch;
      margin: 22px auto 0;
      text-align: center;
    }

    .signup label {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .signup-row {
      display: flex;
      gap: 8px;
    }

    .signup input {
      min-width: 0;
      flex: 1;
      padding: 9px 10px;
      border: 2px solid var(--muted);
      font: inherit;
      font-size: 0.9rem;
      color: var(--text);
      background: rgba(0, 0, 0, 0.62);
    }

    .signup button {
      padding: 9px 12px;
      border: 2px solid var(--gold);
      font: inherit;
      font-size: 0.9rem;
      font-weight: 900;
      color: var(--black);
      background: var(--gold);
      cursor: pointer;
    }

    .blog {
      max-width: 48ch;
      margin: 52px auto 0;
      text-align: left;
      color: var(--text);
    }

    .blog h2 {
      margin: 0 0 18px;
      color: var(--gold);
      font-size: 1.25rem;
      text-transform: uppercase;
    }

    .post {
      margin-top: 24px;
    }

    .post h3 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }

    .post time {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .post p {
      max-width: none;
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.38; }
    }

    @keyframes float-letter {
      0%, 100% {
        transform: translate(0, 0) rotate(0deg);
      }

      25% {
        transform: translate(0.04em, -0.11em) rotate(2deg);
      }

      50% {
        transform: translate(-0.03em, 0.08em) rotate(-2deg);
      }

      75% {
        transform: translate(0.02em, -0.05em) rotate(1deg);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 aria-label="Howdy, Bug Hill">
      <span aria-hidden="true">
        <span class="float-letter" style="--i: 1">H</span><span class="float-letter" style="--i: 2">o</span><span class="float-letter" style="--i: 3">w</span><span class="float-letter" style="--i: 4">d</span><span class="float-letter" style="--i: 5">y</span><span class="float-letter" style="--i: 6">,</span>
        <br />
        <span class="float-letter" style="--i: 7">B</span><span class="float-letter" style="--i: 8">u</span><span class="float-letter" style="--i: 9">g</span><span class="title-space"></span><span class="float-letter" style="--i: 10">H</span><span class="float-letter" style="--i: 11">i</span><span class="float-letter" style="--i: 12">l</span><span class="float-letter" style="--i: 13">l</span>
      </span>
    </h1>
    <p>Working on a new game...</p>

    <form
      class="signup"
      action="https://buttondown.com/api/emails/embed-subscribe/howdybughill"
      method="post"
    >
      <label for="bd-email">Get tiny updates by email</label>
      <div class="signup-row">
        <input id="bd-email" type="email" name="email" placeholder="you@example.com" required />
        <button type="submit">Join</button>
      </div>
    </form>

    <section class="blog" aria-label="Updates">
      <h2>Updates</h2>

      <!-- Copy this article block to add another post. -->
      <article class="post">
        <h3>First update title</h3>
        <time datetime="2026-05-12">May 12, 2026</time>
        <p>
          Write your blog post here. You can edit this text directly in
          index.html and add more posts by copying this article block.
        </p>
      </article>
    </section>

    <div class="pill">
      growing quietly
    </div>
  </main>
</body>
</html>
